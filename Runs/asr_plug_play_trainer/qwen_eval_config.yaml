model:
  model_id: Qwen/Qwen3-ASR-0.6B
  sample_rate: 16000
  prompt_template: "Transcribe this audio in Arabic."
  qwen_language: Arabic

data:
  format: jsonl
  path: /path/to/your/asr_dataset.jsonl
  columns:
    audio: audio_path
    text: text
    duration: duration
    split: split
    uid: uid
  language: ar
  min_seconds: 0.05
  long_audio_policy: keep

training:
  num_train_epochs: 20
  early_stopping_patience: 5

evaluation:
  split: test
  metric_normalizer: arabic_basic
  max_new_tokens: 256

output:
  work_dir: ./runs/qwen3_asr_eval
  log_level: INFO
