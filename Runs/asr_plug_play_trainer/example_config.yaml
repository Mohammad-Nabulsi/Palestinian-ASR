# Change only model.model_id and data.path/columns for most runs.
model:
  # Examples:
  # openai/whisper-large-v3
  # openai/whisper-medium
  # facebook/wav2vec2-large-xlsr-53-arabic
  # Qwen/Qwen3-ASR-0.6B
  # facebook/omniASR-LLM-300M-v2
  # facebook/omniASR-LLM-1B-v2
  # CohereLabs/cohere-transcribe-03-2026
  # nvidia/stt_ar_fastconformer_hybrid_large_pcd_v1.0
  model_id: openai/whisper-large-v3
  sample_rate: 16000
  language: arabic
  task: transcribe
  prompt_template: "Transcribe this audio in Arabic."
  gradient_checkpointing: true

  # Omnilingual-only optional settings:
  # omnilingual_language: apc_Arab
  # omnilingual_python: /home/MohammadNabulsi/whisper/.venv/bin/python
  # Optional override if registry guesses wrong:
  # spec_overrides:
  #   backend: hf_ctc
  #   max_train_seconds: 20

data:
  # Supported: jsonl, json, csv, parquet, manifest, hf
  format: jsonl
  path: /path/to/your/asr_dataset.jsonl
  columns:
    audio: audio_path       # can be audio.path for nested JSON
    text: text
    duration: duration
    split: split
    uid: uid
    speaker_id: speaker_id
    language: language
  language: ar
  min_seconds: 0.05
  # For models with duration caps. drop is safest unless transcripts are timestamp-aligned.
  long_audio_policy: drop   # drop | keep | first_chunk | error
  val_ratio: 0.1
  test_ratio: 0.1
  seed: 42

training:
  num_train_epochs: 20
  early_stopping_patience: 5
  per_device_train_batch_size: 4
  per_device_eval_batch_size: 4
  gradient_accumulation_steps: 4
  learning_rate: 1.0e-5
  train_num_steps: 500
  validate_every_n_steps: 50
  checkpoint_every_n_steps: 50
  warmup_ratio: 0.05
  logging_steps: 10
  save_total_limit: 3
  bf16: true
  fp16: false
  report_to: none
  generation_max_length: 256

evaluation:
  split: test
  metric_normalizer: arabic_basic
  max_new_tokens: 256

output:
  work_dir: ./runs/asr_universal_run
  log_level: INFO
