model:
  model_id: openai/whisper-large-v3
  sample_rate: 16000
  language: arabic
  task: transcribe
  prompt_template: "Transcribe this audio in Arabic."
  gradient_checkpointing: true

data:
  format: jsonl
  split_paths:
    train: ./datasets/whisper_large_v3_levantine_1x1x1/train.jsonl
    validation: ./datasets/whisper_large_v3_levantine_1x1x1/validation.jsonl
    test: ./datasets/whisper_large_v3_levantine_1x1x1/test.jsonl
  columns:
    audio: audio_path
    text: text
    duration: duration
    split: split
    uid: uid
    speaker_id: speaker_id
    language: language
  language: ar
  min_seconds: 0.3
  long_audio_policy: drop
  seed: 42

training:
  num_train_epochs: 1
  early_stopping_patience: 2
  per_device_train_batch_size: 1
  per_device_eval_batch_size: 1
  gradient_accumulation_steps: 1
  learning_rate: 1.0e-5
  warmup_ratio: 0.0
  logging_steps: 1
  save_total_limit: 2
  bf16: true
  fp16: false
  report_to: none
  generation_max_length: 256

evaluation:
  split: test
  metric_normalizer: arabic_basic
  max_new_tokens: 256

output:
  work_dir: ./runs/whisper_large_v3_levantine_1x1x1
  log_level: INFO
